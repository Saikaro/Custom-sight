name: Build CustomSight

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:          # ручной запуск из вкладки Actions

jobs:
  build:
    runs-on: windows-latest   # нужен Windows — используем win32api

    steps:
      # ── 1. Получить код ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Установить Python ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip              # кешируем pip для ускорения повторных запусков

      # ── 3. Установить все зависимости (runtime + build) ────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      # ── 4. Сборка через spec-файл ──────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller CustomSight.spec --noconfirm

      # ── 5. Загрузить onedir-версию как артефакт (всегда) ──────────────────
      - name: Upload onedir artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustomSight-onedir
          path: dist/CustomSight/
          retention-days: 30

      # ── 6. Загрузить portable exe как артефакт (всегда) ───────────────────
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CustomSight-portable
          path: dist/CustomSight-portable.exe
          retention-days: 30

      # ── 7. Создать GitHub Release при пуше тега v* ────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CustomSight-portable.exe
          generate_release_notes: true
